<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrestigePerf | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/hero-sequence.css">
    <link rel="stylesheet" href="css/chatbot.css">
</head>
<body>

<!-- Header -->
<div id="header"></div>

<!-- Hero -->
<section class="pp-hero">
    <canvas id="image-sequence"></canvas>
    <div class="pp-hero-overlay"></div>
    <div class="pp-hero-content">
        <p class="pp-hero-eyebrow">PrestigePerf</p>
        <h1 class="pp-hero-title">Scent, Elevated</h1>
        <p class="pp-hero-sub">Discover fragrances crafted for the moments worth remembering.</p>
        <div class="pp-hero-cta">
            <p>New Collection Available</p>
            <a href="#shop" class="pp-hero-btn">Explore Now</a>
        </div>
    </div>
</section>

<!-- Shop / Products -->
<section class="pp-shop-section" id="shop">
    <div class="container-fluid" style="max-width: 1600px; padding: 0 40px;">
        <div class="text-center mb-2">
            <h2>Our Fragrances</h2>
        </div>
        <div class="pp-gold-rule mb-5"></div>

        <!-- Search -->
        <div class="pp-search-wrap">
            <input type="text" id="search-input" placeholder="Search fragrances...">
            <ul id="autocomplete-list" class="list-group shadow"></ul>
        </div>

        <!-- Product Grid -->
        <div id="items" class="row"></div>

        <!-- Loading Spinner -->
        <div id="loading-spinner" class="text-center py-4" style="display:none;">
            <div class="spinner-border" style="color:#8b1a4a;" role="status">
                <span class="sr-only">Loading...</span>
            </div>
            <p class="text-muted mt-2" style="font-size:12px; letter-spacing:0.1em;">Loading more products...</p>
        </div>

        <!-- End of Products -->
        <div id="end-of-products" class="text-center py-4" style="display:none;">
            <div class="pp-gold-rule mb-3"></div>
            <p style="font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-muted);">
                You've seen all our fragrances
            </p>
        </div>
    </div>
</section>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="js/hero-sequence.js"></script>
<script src="js/home.js"></script>
<script src="js/chatbot.js"></script>
</body>
</html>
