<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrestigePerf | Charts</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="header"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 style="color: #8b1a4a;">Charts & Analytics</h4>
        <div class="btn-group">
            <button class="btn btn-sm btn-outline-secondary btn-period active" data-period="all">All Time</button>
            <button class="btn btn-sm btn-outline-secondary btn-period" data-period="year">This Year</button>
            <button class="btn btn-sm btn-outline-secondary btn-period" data-period="month">This Month</button>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card text-white" style="background:#8b1a4a;">
                <div class="card-body">
                    <h6>Total Products</h6>
                    <h2 id="total-products">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-dark">
                <div class="card-body">
                    <h6>Total Orders</h6>
                    <h2 id="total-orders">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-secondary">
                <div class="card-body">
                    <h6>Total Users</h6>
                    <h2 id="total-users">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-danger">
                <div class="card-body">
                    <h6>Total Categories</h6>
                    <h2 id="total-categories">0</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <!-- Bar Chart -->
        <div class="col-md-6 mb-4">
            <div class="card p-3">
                <h6 class="mb-3">Stock per Product</h6>
                <canvas id="barChart"></canvas>
            </div>
        </div>

        <!-- Line Chart -->
        <div class="col-md-6 mb-4">
            <div class="card p-3">
                <h6 class="mb-3">Orders Over Time</h6>
                <canvas id="lineChart"></canvas>
            </div>
        </div>

        <!-- Pie Chart -->
        <div class="col-md-6 mb-4">
            <div class="card p-3">
                <h6 class="mb-3">Top 5 Selling Products</h6>
                <canvas id="pieChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/charts.js"></script>
</body>
</html>
