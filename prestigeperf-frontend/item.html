<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrestigePerf | Manage Products</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap4.min.css">
    <!-- style.css = brand tokens + storefront. admin.css = global admin system, reuse on EVERY admin page -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/product-modal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,400&family=Jost:wght@400;500&display=swap" rel="stylesheet">
</head>
<body style="display:none;" class="pp-admin-body">

<div id="sidebar"></div>

<div class="pp-main">
    <div class="pp-admin-header">
        <div>
            <span class="pp-admin-eyebrow">Catalog</span>
            <h4 class="pp-admin-title">Manage Products</h4>
        </div>
        <div class="pp-admin-actions">
            <button class="pp-btn pp-btn-outline" id="btn-toggle-view">Show Inactive</button>
            <button class="pp-btn pp-btn-solid" data-toggle="modal" data-target="#productModal" id="btn-add">+ Add Product</button>
        </div>
    </div>

    <div class="pp-admin-card">
        <div class="pp-table-wrap">
            <table id="products-table" class="table" style="width:100%">
                <thead></thead>
                <tbody id="products-body"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Product Modal — "Atelier Entry" -->
<div class="modal fade pp-admin-modal pp-pmodal" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered pp-pmodal-dialog">
        <div class="modal-content">

            <div class="pp-pmodal-header">
                <button type="button" class="pp-pmodal-close" data-dismiss="modal" aria-label="Close">&times;</button>
                <span class="pp-pmodal-eyebrow">Catalog · New Entry</span>
                <h5 class="pp-pmodal-title" id="modal-title">Add <em>Product</em></h5>
            </div>
            <div class="pp-pmodal-diffusion"></div>

            <div class="pp-pmodal-body">
                <form id="productForm" class="pp-admin-form" autocomplete="off">
                    <input type="hidden" id="product_id" name="product_id">

                    <div class="pp-pmodal-grid">

                        <!-- ── Media column ───────────────────────── -->
                        <div class="pp-pmodal-media">
                            <span class="pp-pmodal-media-label">Imagery</span>

                            <div class="pp-dropzone" id="dropzone">
                                <div class="pp-dropzone-icon"><i class="fas fa-cloud-arrow-up"></i></div>
                                <div class="pp-dropzone-text"><b>Click to upload</b><br>or drag images here</div>
                                <div class="pp-dropzone-hint">JPG · PNG · WEBP</div>
                                <input type="file" id="images" name="images" accept="image/*" multiple>
                            </div>

                            <div id="image-preview" class="pp-thumb-grid" style="display:none;"></div>
                            <div id="existing-images" class="pp-thumb-grid"></div>
                        </div>

                        <!-- ── Form column ────────────────────────── -->
                        <div class="pp-pmodal-fields">

                            <div class="pp-pmodal-section">
                                <span class="pp-pmodal-section-label">Details</span>

                                <div class="pp-field">
                                    <label>Product Name<span class="req">*</span></label>
                                    <input type="text" id="product_name" name="product_name" class="form-control" placeholder="e.g. Noir de Velours">
                                </div>

                                <div class="pp-field">
                                    <label>Description</label>
                                    <textarea id="description" name="description" class="form-control" rows="2" placeholder="A short, evocative description..."></textarea>
                                </div>

                                <div class="pp-field-row">
                                    <div class="pp-field">
                                        <label>Category<span class="req">*</span></label>
                                        <select id="category_id" name="category_id" class="form-control">
                                            <option value="">-- Select Category --</option>
                                        </select>
                                    </div>
                                    <div class="pp-field">
                                        <label>Supplier<span class="req">*</span></label>
                                        <select id="supplier_id" name="supplier_id" class="form-control">
                                            <option value="">-- Select Supplier --</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="pp-pmodal-section">
                                <span class="pp-pmodal-section-label">Pricing &amp; Stock</span>

                                <div class="pp-field-row">
                                    <div class="pp-field">
                                        <label>Cost Price<span class="req">*</span></label>
                                        <div class="pp-prefix-wrap">
                                            <span class="pp-currency">₱</span>
                                            <input type="number" id="initial_price" name="initial_price" class="form-control" min="0" step="0.01" placeholder="0.00">
                                        </div>
                                    </div>
                                    <div class="pp-field">
                                        <label>Sell Price<span class="req">*</span></label>
                                        <div class="pp-prefix-wrap">
                                            <span class="pp-currency">₱</span>
                                            <input type="number" id="selling_price" name="selling_price" class="form-control" min="0" step="0.01" placeholder="0.00">
                                        </div>
                                    </div>
                                </div>

                                <div class="pp-margin-badge">
                                    <span class="pp-margin-label">Margin</span>
                                    <span class="pp-margin-value is-flat" id="margin-value">—</span>
                                </div>

                                <div class="pp-field-row" style="margin-top:20px;">
                                    <div class="pp-field">
                                        <label>Stock<span class="req">*</span></label>
                                        <input type="number" id="stock_quantity" name="stock_quantity" class="form-control" min="0" placeholder="0">
                                    </div>
                                    <div class="pp-field">
                                        <label>Variant</label>
                                        <input type="text" id="variant" name="variant" class="form-control" placeholder="e.g. 100ml">
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer pp-pmodal-footer">
                <button type="button" class="pp-pmodal-btn-cancel" data-dismiss="modal">Cancel</button>
                <button type="button" class="pp-pmodal-btn-save" id="btn-save"><i class="fas fa-check"></i> Save Product</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/item.js"></script>
</body>
</html>
