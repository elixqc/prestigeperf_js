<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrestigePerf | Manage Products</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        label.error { color: red; font-size: 12px; margin-top: 2px; }
        input.error, select.error, textarea.error { border-color: red; }
    </style>
</head>
<body style="display:none;">

<div id="sidebar"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 style="color: #8b1a4a;">Manage Products</h4>
        <div>
            <button class="btn btn-secondary mr-2" id="btn-toggle-view">Show Inactive</button>
            <button class="btn btn-primary" data-toggle="modal" data-target="#productModal" id="btn-add">+ Add Product</button>
        </div>
    </div>

    <div class="card p-3">
        <table id="products-table" class="table table-bordered table-hover">
            <thead style="background:#8b1a4a; color:white;"></thead>
            <tbody id="products-body"></tbody>
        </table>
    </div>
</div>

<!-- Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header" style="background:#8b1a4a; color:white;">
                <h5 class="modal-title" id="modal-title">Add Product</h5>
                <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="productForm">
                    <input type="hidden" id="product_id" name="product_id">
                    <div class="form-group">
                        <label>Product Name <span class="text-danger">*</span></label>
                        <input type="text" id="product_name" name="product_name" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="description" name="description" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label>Category</label>
                            <select id="category_id" name="category_id" class="form-control">
                                <option value="">-- Select Category --</option>
                            </select>
                        </div>
                        <div class="form-group col-md-6">
                            <label>Supplier</label>
                            <select id="supplier_id" name="supplier_id" class="form-control">
                                <option value="">-- Select Supplier --</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label>Cost Price <span class="text-danger">*</span></label>
                            <input type="number" id="initial_price" name="initial_price" class="form-control" min="0" step="0.01">
                        </div>
                        <div class="form-group col-md-6">
                            <label>Sell Price <span class="text-danger">*</span></label>
                            <input type="number" id="selling_price" name="selling_price" class="form-control" min="0" step="0.01">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label>Stock <span class="text-danger">*</span></label>
                            <input type="number" id="stock_quantity" name="stock_quantity" class="form-control" min="0">
                        </div>
                        <div class="form-group col-md-6">
                            <label>Variant</label>
                            <input type="text" id="variant" name="variant" class="form-control" placeholder="e.g. 100ml">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Images</label>
                        <input type="file" id="images" name="images" class="form-control-file" accept="image/*" multiple>
                        <div id="image-preview" class="mt-2" style="display:none;"></div>
                        <div id="existing-images" class="mt-2"></div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="btn-save">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/item.js"></script>
</body>
</html>
