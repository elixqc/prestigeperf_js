<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrestigePerf | Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Brand at top -->
<div class="pp-auth-brand">
    <p class="pp-auth-brand-sub">Prestige</p>
    <h2 class="pp-auth-brand-name">PRESTIGEPERF</h2>
</div>

<!-- Centered form -->
<div class="pp-auth-wrapper">
    <div class="pp-auth-box">

        <!-- Step 1: Email -->
        <div id="step-email">
            <h3 class="pp-auth-title">Sign in</h3>
            <p class="pp-auth-subtitle">Enter your email to continue</p>
            <form id="emailForm" novalidate onsubmit="return false;">
                <div class="pp-auth-input-wrap form-group">
                    <label>Email</label>
                    <input type="text" id="email" name="email" class="form-control" placeholder="your@email.com">
                </div>
                <button type="submit" class="pp-auth-btn btn-block">Continue →</button>
            </form>
            <p class="pp-auth-footer mt-3">
                Don't have an account? <a href="register.html">Create one</a>
            </p>
        </div>

        <!-- Step 2: Password -->
        <div id="step-password" style="display:none;">
            <button class="pp-auth-back" id="btn-back">← Back</button>
            <h3 class="pp-auth-title mt-3">Welcome back</h3>
            <p class="pp-auth-subtitle" id="email-display"></p>
            <form id="loginForm" novalidate onsubmit="return false;">
                <div class="pp-auth-input-wrap form-group">
                    <label>Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••">
                    <button type="button" id="btn-toggle-pw" class="pp-auth-eye">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12C3.75 7.5 7.5 4.5 12 4.5s8.25 3 9.75 7.5c-1.5 4.5-5.25 7.5-9.75 7.5S3.75 16.5 2.25 12z"/>
                            <circle cx="12" cy="12" r="3" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
                <button type="submit" class="pp-auth-btn btn-block">Sign In →</button>
            </form>
        </div>

    </div>

    <div class="pp-auth-bottom">
        <a href="home.html">Back to Shop</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/login.js"></script>
</body>
</html>
