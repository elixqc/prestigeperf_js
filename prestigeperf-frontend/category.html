<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrestigePerf | Manage Categories</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body style="display:none;" class="pp-admin-body">

<div id="sidebar"></div>

<div class="pp-main">
    <div class="pp-admin-header">
        <div>
            <span class="pp-admin-eyebrow">Catalog</span>
            <h4 class="pp-admin-title">Manage Categories</h4>
        </div>
        <div class="pp-admin-actions">
            <button class="pp-btn pp-btn-outline" id="btn-toggle-view">Show Inactive</button>
            <button class="pp-btn pp-btn-solid" id="btn-add" data-toggle="modal" data-target="#categoryModal">
                + Add Category
            </button>
        </div>
    </div>

    <div class="pp-admin-card">
        <div class="pp-table-wrap">
            <table id="categories-table" class="table" style="width:100%"></table>
        </div>
    </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade pp-admin-modal" id="categoryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modal-title">Add Category</h5>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="categoryForm" class="pp-admin-form">
                    <input type="hidden" id="category_id">
                    <div class="form-group">
                        <label>Category Name</label>
                        <input type="text" id="category_name" name="category_name"
                               class="form-control" placeholder="e.g. Women">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="pp-btn pp-btn-outline" data-dismiss="modal">Cancel</button>
                <button type="button" class="pp-btn pp-btn-solid" id="btn-save">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/category.js"></script>
</body>
</html>
