<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrestigePerf | Manage Orders</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body style="display:none;" class="pp-admin-body">

<div id="sidebar"></div>

<div class="pp-main">
    <div class="pp-admin-header">
        <div>
            <span class="pp-admin-eyebrow">Sales</span>
            <h4 class="pp-admin-title">Manage Orders</h4>
        </div>
    </div>

    <div class="pp-admin-card">
        <div class="pp-table-wrap">
            <table id="orders-table" class="table" style="width:100%"></table>
        </div>
    </div>
</div>

<!-- Update Status Modal -->
<div class="modal fade pp-admin-modal" id="statusModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Update Order Status</h5>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="update-order-id">
                <div class="form-group">
                    <label>Order Status</label>
                    <select id="order_status" class="form-control">
                        <!-- populated via JS -->
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="pp-btn pp-btn-outline" data-dismiss="modal">Cancel</button>
                <button type="button" class="pp-btn pp-btn-solid" id="btn-update-status">Update</button>
            </div>
        </div>
    </div>
</div>

<!-- Order Detail Modal -->
<div class="modal fade pp-admin-modal" id="orderDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Order <span id="detail-order-id"></span></h5>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="pp-detail-grid">
                    <div>
                        <span class="pp-detail-block-label">Customer</span>
                        <div class="pp-detail-name" id="detail-customer-name"></div>
                        <div class="pp-detail-line" id="detail-customer-email"></div>
                        <div class="pp-detail-line" id="detail-customer-contact"></div>
                    </div>
                    <div>
                        <span class="pp-detail-block-label">Shipping Address</span>
                        <div class="pp-detail-line" id="detail-customer-address"></div>
                    </div>
                </div>

                <div class="pp-detail-grid">
                    <div>
                        <span class="pp-detail-block-label">Payment</span>
                        <div class="pp-detail-line">
                            Method: <span id="detail-payment-method"></span><br>
                            Reference: <span id="detail-payment-reference"></span>
                        </div>
                    </div>
                    <div>
                        <span class="pp-detail-block-label">Status &amp; Date</span>
                        <div class="pp-detail-line">
                            <span id="detail-status-pill"></span><br>
                            <span id="detail-order-date"></span>
                        </div>
                    </div>
                </div>

                <hr class="pp-detail-divider">

                <span class="pp-detail-block-label">Items</span>
                <table class="pp-detail-items-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="detail-items-body"></tbody>
                </table>

                <div class="pp-detail-total-row">
                    <span class="pp-detail-total-label">Grand Total</span>
                    <span class="pp-detail-total-amount" id="detail-grand-total"></span>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="pp-btn pp-btn-outline" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/orders.js"></script>
</body>
</html>
