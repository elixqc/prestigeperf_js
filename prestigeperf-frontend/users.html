<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrestigePerf | Manage Users</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body style="display:none;" class="pp-admin-body">

<div id="sidebar"></div>

<div class="pp-main">
    <div class="pp-admin-header">
        <div>
            <span class="pp-admin-eyebrow">Accounts</span>
            <h4 class="pp-admin-title">Manage Users</h4>
        </div>
    </div>

    <div class="pp-admin-card">
        <div class="pp-table-wrap">
            <table id="users-table" class="table" style="width:100%"></table>
        </div>
    </div>
</div>

<!-- Edit Role Modal -->
<div class="modal fade pp-admin-modal" id="roleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Update User Role</h5>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="user_id">

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="user_username" class="form-control" readonly>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="text" id="user_email" class="form-control" readonly>
                </div>

                <div class="form-group">
                    <label>Role</label>
                    <select id="role" class="form-control">
                        <option value="customer">Customer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="pp-btn pp-btn-outline" data-dismiss="modal">Cancel</button>
                <button type="button" class="pp-btn pp-btn-solid" id="btn-save-role">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/users.js"></script>
</body>
</html>
