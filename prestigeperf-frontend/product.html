<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrestigePerf | Product</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="header"></div>

<section class="pp-product-section">
    <div class="container">

        <!-- Breadcrumb -->
        <nav class="pp-breadcrumb mb-4">
            <a href="home.html">Shop</a>
            <span>&#8212;</span>
            Product Detail
        </nav>

        <!-- Product Detail (populated by product.js) -->
        <div id="product-detail" class="row">
            <div class="col-12 text-center py-5">
                <div class="spinner-border" style="color:var(--primary);" role="status">
                    <span class="sr-only">Loading...</span>
                </div>
                <p style="font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-muted); margin-top:12px;">
                    Loading product...
                </p>
            </div>
        </div>

    </div>
</section>

<!-- Recommended Products -->
<section class="pp-recommended">
    <div class="container">
        <div class="pp-gold-rule mb-4"></div>
        <p class="pp-recommended-subtitle">A selection of products for you</p>
        <h2 class="pp-recommended-title">Discover</h2>
        <div id="recommended-items" class="row"></div>
    </div>
</section>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/chatbot.js"></script>
<script src="js/product.js"></script>
</body>
</html>
