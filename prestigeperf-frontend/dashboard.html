<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrestigePerf | Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body style="display:none;" class="pp-admin-body">

<div id="sidebar"></div>

<div class="pp-main">
    <div class="pp-admin-header">
        <div>
            <span class="pp-admin-eyebrow">Overview</span>
            <h4 class="pp-admin-title">Dashboard</h4>
        </div>
        <div class="pp-period-group">
            <button class="pp-period-btn btn-period active" data-period="all">All Time</button>
            <button class="pp-period-btn btn-period" data-period="year">This Year</button>
            <button class="pp-period-btn btn-period" data-period="month">This Month</button>
        </div>
    </div>

    <!-- Stats -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="pp-stat pp-stat-wine">
                <i class="fas fa-peso-sign pp-stat-icon"></i>
                <h6>Total Sales</h6>
                <h2 id="total-sales">₱0.00</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="pp-stat pp-stat-ink">
                <i class="fas fa-receipt pp-stat-icon"></i>
                <h6>Total Orders</h6>
                <h2 id="total-orders">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="pp-stat pp-stat-gold">
                <i class="fas fa-users pp-stat-icon"></i>
                <h6>Total Users</h6>
                <h2 id="total-users">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="pp-stat pp-stat-plum">
                <i class="fas fa-tags pp-stat-icon"></i>
                <h6>Total Categories</h6>
                <h2 id="total-categories">0</h2>
            </div>
        </div>
    </div>

    <!-- Charts -->
    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="pp-admin-card">
                <div class="pp-chart-title">Stock per Product</div>
                <canvas id="barChart"></canvas>
            </div>
        </div>
        <div class="col-md-6 mb-4">
            <div class="pp-admin-card">
                <div class="pp-chart-title">Orders Over Time</div>
                <canvas id="lineChart"></canvas>
            </div>
        </div>
        <div class="col-md-6 mb-4">
            <div class="pp-admin-card">
                <div class="pp-chart-title">Top 5 Selling Products</div>
                <canvas id="pieChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
